services:
  localstack: 
    image: localstack/localstack:3.0
    ports:
      - "4566:4566"
      - "4510-4559:4510-4559"
    environment:
      - SERVICES=s3,sns,sqs
      - AWS_DEFAULT_REGION=us-east-2
    volumes:
      - ./.docker/localstack/bootstrap.sh:/etc/localstack/init/ready.d/01-bootstrap.sh
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - backbone
    healthcheck:
      test: ["CMD", "awslocal", "sqs", "list-queues"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 10s

  service:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      localstack:
        condition: service_healthy
      dynamodb:
        condition: service_started
    env_file:
      - .env
    volumes:
      - sqlite_data:/app/data
    networks:
      - backbone

  dynamodb:
    image: amazon/dynamodb-local
    container_name: dynamodb
    ports:
      - "8000:8000"
    volumes:
      - dynamodb:/data
    command: -jar DynamoDBLocal.jar -sharedDb
    networks:
      - backbone

  # dynamodb-init:
  #   image: amazon/aws-cli
  #   depends_on:
  #     - dynamodb
  #   # entrypoint: ["/bin/sh", "/app/scripts/create_dynamodb_table.sh"]
  #   environment:
  #     - AWS_ACCESS_KEY_ID=dummy
  #     - AWS_SECRET_ACCESS_KEY=dummy
  #     - AWS_DEFAULT_REGION=us-east-2
  #   volumes:
  #     - ./scripts:/app/scripts
  #   networks:
  #     - backbone

volumes:
  sqlite_data:
  dynamodb:

networks:
  backbone:
    driver: bridge